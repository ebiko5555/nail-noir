<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NAIL NOIR — Men's Nail Lab</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"
        onerror="window.__mpFailed=true"></script>
<style>
  :root{
    --bg:#0d0e12; --panel:#15171d; --ink:#e8eaee; --sub:#7d828a;
    --line:#262a33; --acc:#39d98a; --acc2:#2e6fff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{height:100%; overscroll-behavior:none}
  body{
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    background:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 28px,
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/28px 100%,
      var(--bg);
    color:var(--ink);
    display:flex; flex-direction:column;
    max-width:520px; margin:0 auto;
  }
  header{
    flex:none; display:flex; align-items:baseline; justify-content:space-between;
    padding:calc(14px + env(safe-area-inset-top)) 18px 12px;
  }
  header h1{
    font-size:19px; font-weight:800; letter-spacing:.22em;
    color:var(--ink);
  }
  header h1 .noir{color:var(--acc)}
  header .tag{
    font-size:8.5px; letter-spacing:.3em; color:var(--sub);
    border:1px solid var(--line); padding:4px 8px; border-radius:3px;
  }
  /* ---------- ステージ ---------- */
  .stage{
    position:relative; flex:1; min-height:0; margin:0 14px;
    background:#000; border:1px solid var(--line); border-radius:10px; overflow:hidden;
  }
  .stage::after{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:8;
    border-radius:10px;
    box-shadow:inset 0 0 0 1px rgba(57,217,138,.14);
  }
  #canvas{width:100%; height:100%; object-fit:cover; display:block}
  #startOverlay{
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:30px;
    background:
      radial-gradient(80% 60% at 50% 30%, #171a22 0%, #0b0c10 100%);
  }
  #startOverlay .sys{
    font-size:9px; letter-spacing:.4em; color:var(--acc); margin-bottom:16px;
  }
  #startOverlay p{
    font-size:12.5px; color:#9aa1ab; line-height:2.2; letter-spacing:.06em;
    margin-bottom:28px;
  }
  .bigbtn{
    border:1px solid var(--acc); border-radius:6px; padding:15px 42px;
    background:transparent; color:var(--acc);
    font-size:13px; font-weight:700; letter-spacing:.25em; text-indent:.25em;
    font-family:inherit; cursor:pointer;
    box-shadow:0 0 18px rgba(57,217,138,.22), inset 0 0 12px rgba(57,217,138,.06);
    transition:background .15s, color .15s;
  }
  .bigbtn:active{background:var(--acc); color:#0d0e12}
  .bigbtn.sub{
    border-color:var(--line); color:var(--sub); box-shadow:none;
    font-size:11px; padding:11px 26px; margin-top:14px; letter-spacing:.15em;
  }
  #status{margin-top:24px; font-size:10px; letter-spacing:.15em; color:var(--sub); min-height:14px}
  #guide{
    position:absolute; top:14px; left:0; right:0; text-align:center; z-index:4;
    font-size:11px; font-weight:600; letter-spacing:.25em; text-indent:.25em; color:var(--acc);
    text-shadow:0 0 10px rgba(57,217,138,.6); pointer-events:none;
    transition:opacity .4s;
  }
  #countdown{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-size:100px; font-weight:200; color:var(--acc);
    text-shadow:0 0 40px rgba(57,217,138,.5);
    z-index:6; pointer-events:none; font-family:"Helvetica Neue",sans-serif;
  }
  .stagebtns{
    position:absolute; bottom:14px; left:0; right:0; z-index:5;
    display:flex; align-items:center; justify-content:center; gap:26px;
  }
  .shutter{
    width:60px; height:60px; border-radius:50%; cursor:pointer;
    border:2px solid var(--acc);
    background:rgba(57,217,138,.12);
    box-shadow:0 0 16px rgba(57,217,138,.35);
  }
  .shutter:active{background:var(--acc)}
  .roundbtn{
    width:42px; height:42px; border-radius:6px; cursor:pointer;
    border:1px solid var(--line); background:rgba(13,14,18,.7); color:var(--ink);
    font-size:14px; backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
  }
  #snapBar{
    position:absolute; bottom:14px; left:0; right:0; z-index:7;
    display:none; justify-content:center; gap:10px;
  }
  #snapBar .pill{
    border:1px solid var(--line); border-radius:6px; padding:13px 24px;
    font-size:12px; font-weight:700; letter-spacing:.15em; font-family:inherit; cursor:pointer;
    background:rgba(13,14,18,.8); color:var(--ink); backdrop-filter:blur(8px);
  }
  #snapBar .pill.primary{background:var(--acc); border-color:var(--acc); color:#0d0e12}
  /* ---------- 下部パネル ---------- */
  .panel{flex:none; padding:12px 16px calc(10px + env(safe-area-inset-bottom))}
  .tabs{display:flex; gap:6px; margin-bottom:12px}
  .tab{
    flex:1; text-align:center;
    font-size:10px; font-weight:700; letter-spacing:.2em; text-indent:.2em;
    color:var(--sub); padding:9px 0; cursor:pointer;
    border:1px solid var(--line); border-radius:6px; background:var(--panel);
    transition:color .2s, border-color .2s;
  }
  .tab.active{color:var(--acc); border-color:var(--acc)}
  .tray{display:none}
  .tray.active{display:block; animation:fade .25s ease}
  @keyframes fade{from{opacity:0} to{opacity:1}}
  .scroller{display:flex; gap:12px; overflow-x:auto; padding:6px 2px 6px; scrollbar-width:none}
  .scroller::-webkit-scrollbar{display:none}
  .look{flex:none; text-align:center; cursor:pointer}
  .look canvas{
    width:52px; height:66px; display:block; margin:0 auto;
    border-radius:14px;
    background:#000; border:1px solid var(--line);
    transition:border-color .2s, box-shadow .2s;
  }
  .look.active canvas{border-color:var(--acc); box-shadow:0 0 12px rgba(57,217,138,.35)}
  .look span{font-size:9px; letter-spacing:.05em; color:var(--sub); display:block; margin-top:6px}
  .look.active span{color:var(--acc)}
  .addtile .addbox{
    width:52px; height:66px; margin:0 auto; border-radius:14px;
    border:1px dashed #3a3f4a; color:var(--sub);
    display:flex; align-items:center; justify-content:center;
    font-size:9.5px; font-weight:700; background:rgba(21,23,29,.6);
  }
  .chip{
    flex:none; width:36px; height:36px; border-radius:8px; cursor:pointer;
    border:1px solid var(--line);
    transition:border-color .2s, box-shadow .2s;
  }
  .chip.active{border-color:var(--acc); box-shadow:0 0 10px rgba(57,217,138,.35)}
  .fx{
    flex:none; padding:10px 16px; cursor:pointer;
    border:1px solid var(--line); border-radius:6px; background:var(--panel);
    font-size:11.5px; font-weight:700; letter-spacing:.08em; font-family:inherit; color:var(--sub);
  }
  .fx.active{color:var(--acc); border-color:var(--acc); box-shadow:0 0 10px rgba(57,217,138,.25)}
  .minirow{display:flex; align-items:center; gap:12px; margin-top:10px; font-size:10px; letter-spacing:.12em; color:var(--sub)}
  input[type=range]{flex:1; accent-color:var(--acc); height:22px}
  #note{font-size:10.5px; color:var(--sub); margin-top:8px; min-height:15px; line-height:1.8}
  .ghostlink{
    font-size:10.5px; font-weight:700; color:var(--acc2); cursor:pointer;
    text-decoration:underline; text-underline-offset:3px; white-space:nowrap;
  }
  input[type=file]{display:none}
  /* ---------- エディタ ---------- */
  #editor{
    position:fixed; inset:0; z-index:50; display:none;
    align-items:center; justify-content:center;
    background:rgba(5,6,8,.75); backdrop-filter:blur(6px); padding:18px;
  }
  .edcard{
    width:100%; max-width:360px; background:var(--panel);
    border:1px solid var(--line); border-radius:12px; padding:16px;
  }
  .edtitle{text-align:center; font-size:12px; font-weight:700; letter-spacing:.25em; margin-bottom:12px; color:var(--ink)}
  .edstage{
    display:flex; justify-content:center; border-radius:10px; padding:10px;
    background:conic-gradient(#1b1e26 25%, #14161c 0 50%, #1b1e26 0 75%, #14161c 0) 0 0/16px 16px;
    border:1px solid var(--line);
  }
  #edCanvas{
    width:210px; height:280px; touch-action:none; cursor:crosshair;
    background:linear-gradient(#2a2d35,#1c1f26);
    border-radius:70px 70px 54px 54px;
    border:1px solid #333845;
  }
  .edrow{display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap}
  .edsw{width:26px; height:26px; border-radius:6px; cursor:pointer; border:1px solid var(--line)}
  .edbtn{
    border:1px solid var(--line); border-radius:6px; padding:8px 14px;
    background:transparent; color:var(--sub); font-family:inherit; font-size:11px; font-weight:700; cursor:pointer;
  }
  .edbtn.on{color:var(--acc); border-color:var(--acc)}
  .edbtn.primary{background:var(--acc); color:#0d0e12; border-color:var(--acc)}
  .edrow.acts{justify-content:flex-end; margin-top:12px}
</style>
</head>
<body>
<header>
  <h1>NAIL <span class="noir">NOIR</span></h1>
  <div class="tag">MEN'S NAIL LAB</div>
</header>

<div class="stage">
  <canvas id="canvas"></canvas>
  <div id="guide" style="opacity:0">HANDS UP</div>
  <div id="countdown"></div>

  <div id="startOverlay">
    <div class="sys">SYSTEM READY</div>
    <p>カメラに手をかざすと<br>選んだデザインが爪に乗る。<br>指先で語れ。</p>
    <button class="bigbtn" id="startBtn">START CAMERA</button>
    <button class="bigbtn sub" onclick="document.getElementById('handInput').click()">写真でためす</button>
    <div id="status"></div>
  </div>

  <div class="stagebtns" id="liveBtns" style="display:none">
    <button class="roundbtn" id="timerBtn">3s</button>
    <button class="shutter" id="shutterBtn"></button>
    <button class="roundbtn" id="flipBtn">⟲</button>
  </div>

  <div id="snapBar">
    <button class="pill primary" id="saveBtn">SAVE</button>
    <button class="pill" id="retryBtn">RETRY</button>
  </div>
</div>

<div class="panel">
  <div class="tabs">
    <div class="tab active" data-t="looks">DESIGN</div>
    <div class="tab" data-t="colors">COLOR</div>
    <div class="tab" data-t="fx">FX</div>
    <div class="tab" data-t="tune">TUNE</div>
  </div>

  <div class="tray active" id="tray-looks">
    <div class="scroller" id="looksRow"></div>
  </div>

  <div class="tray" id="tray-colors">
    <div class="scroller" id="chips"></div>
    <div class="minirow">
      <span class="ghostlink" onclick="document.getElementById('inspoInput').click()">好きな画像から色を抽出</span>
    </div>
    <div id="note"></div>
  </div>

  <div class="tray" id="tray-fx">
    <div class="scroller" id="fxRow"></div>
    <div class="minirow">FX量 <input type="range" id="fxAmount" min="10" max="100" value="45"></div>
  </div>

  <div class="tray" id="tray-tune">
    <div class="minirow">ツヤ <input type="range" id="gloss" min="0" max="100" value="30"></div>
    <div class="minirow">濃さ <input type="range" id="opacity" min="40" max="100" value="96"></div>
    <div class="minirow">大きさ <input type="range" id="nailSize" min="70" max="140" value="100"></div>
  </div>
</div>

<input type="file" id="handInput" accept="image/*">
<input type="file" id="inspoInput" accept="image/*">
<input type="file" id="designInput" accept="image/*">
<video id="video" playsinline style="display:none"></video>

<!-- エディタ -->
<div id="editor">
  <div class="edcard">
    <div class="edtitle">CUSTOM DESIGN</div>
    <div class="edstage"><canvas id="edCanvas" width="300" height="400"></canvas></div>
    <div class="edrow" id="edSwatches"></div>
    <div class="edrow tools">
      <button class="edbtn on" id="edPen">ペン</button>
      <button class="edbtn" id="edErase">消す</button>
      <button class="edbtn" id="edClear">全消し</button>
      <input type="range" id="edSize" min="3" max="46" value="14">
    </div>
    <div class="edrow acts">
      <button class="edbtn" id="edCancel">CANCEL</button>
      <button class="edbtn primary" id="edDone">装着する</button>
    </div>
  </div>
</div>

<script>
/* ================= 状態 ================= */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');
let mode = 'idle';
let facing = 'environment';
let stream = null;
let currentColor = '#39d98a';
let currentLook = 'matte';
let currentFx = 'none';
let smoothed = [];
let baseImage = null;
let rafOn = false;
const $ = id => document.getElementById(id);

function setStatus(t){ $('status').textContent = t || ''; }
function setGuide(t){
  const g = $('guide');
  g.textContent = t || '';
  g.style.opacity = t ? 1 : 0;
}

/* ================= MediaPipe ================= */
const MP_CDN = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/';
let liveHands = null, liveReady = null;
let stillHands = null, stillReady = null;
let liveBusy = false;

function makeHands(opts){
  const h = new Hands({locateFile: f => MP_CDN + f});
  h.setOptions(opts);
  return h;
}
function ensureLive(){
  if(window.__mpFailed) return Promise.reject(new Error('cdn'));
  if(!liveReady){
    liveHands = makeHands({maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.6, minTrackingConfidence:0.6});
    liveHands.onResults(res => {
      const lms = res.multiHandLandmarks || [];
      if(lms.length){ lastSeenT = performance.now(); updateLandmarks(lms); }
      else if(performance.now() - lastSeenT > 280){ smoothed.length = 0; }
      liveBusy = false;
    });
    liveReady = liveHands.initialize();
  }
  return liveReady;
}
function ensureStill(){
  if(window.__mpFailed) return Promise.reject(new Error('cdn'));
  if(!stillReady){
    stillHands = makeHands({maxNumHands:2, modelComplexity:1, staticImageMode:true, minDetectionConfidence:0.4});
    stillHands.onResults(res => {
      const lms = res.multiHandLandmarks || [];
      smoothed = lms.map(lm => lm.map(p => ({...p})));
      drawPhoto();
      if(lms.length){ setGuide(''); }
      else setGuide('NO HAND DETECTED — 手全体が写る明るい写真で');
    });
    stillReady = stillHands.initialize();
  }
  return stillReady;
}
let lastSeenT = 0;
function updateLandmarks(lms){
  lms.forEach((lm,h) => {
    if(!smoothed[h] || smoothed[h].length !== lm.length){ smoothed[h] = lm.map(p=>({...p})); return; }
    lm.forEach((p,i)=>{
      const s = smoothed[h][i];
      const d = Math.hypot(p.x - s.x, p.y - s.y);
      const A = Math.min(0.97, 0.34 + d*60);
      s.x += (p.x - s.x)*A;
      s.y += (p.y - s.y)*A;
    });
  });
  smoothed.length = lms.length;
}

/* ================= カメラ ================= */
async function startCamera(){
  setStatus('LOADING AI…');
  try{ await ensureLive(); }
  catch(e){ setStatus('AIモデルを読み込めませんでした。通信を確認して再読み込みしてください'); return; }
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing, width:{ideal:1280}, height:{ideal:720}}, audio:false
    });
    video.srcObject = stream;
    await video.play();
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    mode = 'live';
    smoothed = [];
    $('startOverlay').style.display='none';
    $('liveBtns').style.display='flex';
    $('snapBar').style.display='none';
    setGuide('HANDS UP');
    setStatus('');
    startLoops();
  }catch(e){
    setStatus('カメラを使えませんでした。ブラウザ設定でカメラを許可してください (' + e.name + ')');
  }
}
let lastT = performance.now();
function startLoops(){
  if(rafOn) return;
  rafOn = true;
  (function draw(){
    const now = performance.now();
    const dt = Math.min(50, now - lastT); lastT = now;
    if(mode === 'live' && video.readyState >= 2){
      ctx.save();
      if(mirrored()){ ctx.translate(canvas.width,0); ctx.scale(-1,1); }
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      ctx.restore();
      drawNails();
      spawnParticles();
      stepParticles(dt);
      setGuide(smoothed.length ? '' : 'HANDS UP');
    }
    requestAnimationFrame(draw);
  })();
  (async function detect(){
    if(mode === 'live' && video.readyState >= 2 && !liveBusy){
      liveBusy = true;
      try{ await liveHands.send({image: video}); }
      catch(e){ liveBusy = false; }
    }
    requestAnimationFrame(detect);
  })();
}
$('startBtn').onclick = startCamera;
$('flipBtn').onclick = () => { facing = facing==='environment' ? 'user' : 'environment'; startCamera(); };

/* ================= FXエフェクト ================= */
const FX = {
  none:{name:'OFF'},
  spark:{name:'⚡ スパーク'},
  smoke:{name:'🌫 スモーク'},
  fire:{name:'🔥 ファイア'},
  elec:{name:'💠 エレキ'},
};
const parts = [];
const TIPS = [4,8,12,16,20];
function spawnParticles(){
  if(currentFx==='none' || !smoothed.length) return;
  const amount = $('fxAmount').value/100;
  smoothed.forEach(lm=>{
    TIPS.forEach(t=>{
      if(Math.random() > amount*0.45) return;
      const [x,y] = lmXY(lm[t]);
      parts.push(newPart(x,y));
    });
  });
  if(parts.length > 240) parts.splice(0, parts.length-240);
}
function newPart(x,y){
  const s = canvas.width/375;
  const base = {
    x: x+(Math.random()-0.5)*24, y: y+(Math.random()-0.5)*24,
    life:1, rot:Math.random()*Math.PI*2, spin:(Math.random()-0.5)*0.12,
    tw: Math.random()*Math.PI*2,
  };
  if(currentFx==='fire') return {...base,
    vx:(Math.random()-0.5)*0.8, vy:-1.2-Math.random()*1.8,
    decay:0.02+Math.random()*0.02, size:s*(4+Math.random()*8),
    col:['#ff5a2e','#ff9b3f','#ffd23f'][Math.random()*3|0]};
  if(currentFx==='smoke') return {...base,
    vx:(Math.random()-0.5)*0.5, vy:-0.5-Math.random()*0.8,
    decay:0.006+Math.random()*0.008, size:s*(7+Math.random()*12),
    col:'#aab2bd'};
  if(currentFx==='elec') return {...base,
    vx:(Math.random()-0.5)*2.2, vy:(Math.random()-0.5)*2.2,
    decay:0.03+Math.random()*0.03, size:s*(6+Math.random()*10),
    col:['#2e6fff','#6ec9ff','#ffffff'][Math.random()*3|0]};
  return {...base, // spark
    vx:(Math.random()-0.5)*1.6, vy:-0.4-Math.random()*1.2,
    decay:0.010+Math.random()*0.012, size:s*(4+Math.random()*7),
    col:['#ffffff','#c8ccd2','#39d98a'][Math.random()*3|0]};
}
function stepParticles(dt){
  const k = dt/16.7;
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*k; p.y+=p.vy*k; p.rot+=p.spin*k; p.tw+=0.25*k;
    if(currentFx==='smoke') p.size*=1+0.012*k;
    p.life-=p.decay*k;
    if(p.life<=0){ parts.splice(i,1); continue; }
    drawPart(p);
  }
}
function drawPart(p){
  ctx.save();
  ctx.translate(p.x,p.y); ctx.rotate(p.rot);
  const a = p.life * (0.7 + 0.3*Math.sin(p.tw*3));
  ctx.globalAlpha = Math.max(0,a);
  if(currentFx==='smoke'){
    ctx.globalAlpha *= 0.25;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(0,0,p.size,0,Math.PI*2); ctx.fill();
  }else if(currentFx==='fire'){
    ctx.shadowColor=p.col; ctx.shadowBlur=p.size*1.6;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(0,0,p.size*0.55,0,Math.PI*2); ctx.fill();
  }else if(currentFx==='elec'){
    ctx.shadowColor=p.col; ctx.shadowBlur=p.size;
    ctx.strokeStyle=p.col; ctx.lineWidth=1.4;
    ctx.beginPath();
    let px=-p.size, py=0;
    ctx.moveTo(px,py);
    for(let i=0;i<4;i++){
      px+=p.size/2; py=(Math.random()-0.5)*p.size*0.9;
      ctx.lineTo(px,py);
    }
    ctx.stroke();
  }else{ // spark
    ctx.shadowColor=p.col; ctx.shadowBlur=p.size*1.3;
    sparkle(ctx,p.size,p.col);
  }
  ctx.restore();
}
function sparkle(c,s,col){
  c.fillStyle=col;
  c.beginPath();
  c.moveTo(0,-s); c.quadraticCurveTo(s*0.12,-s*0.12,s,0);
  c.quadraticCurveTo(s*0.12,s*0.12,0,s);
  c.quadraticCurveTo(-s*0.12,s*0.12,-s,0);
  c.quadraticCurveTo(-s*0.12,-s*0.12,0,-s);
  c.closePath(); c.fill();
}
function staticSparkles(){
  if(currentFx==='none' || !smoothed.length) return;
  const amount = $('fxAmount').value/100;
  const rnd = seeded(42);
  smoothed.forEach(lm=>{
    TIPS.forEach(t=>{
      const [x,y]=lmXY(lm[t]);
      const n = Math.round(1+amount*4);
      for(let i=0;i<n;i++){
        const p = newPart(x,y);
        p.x = x+(rnd()-0.5)*70; p.y = y+(rnd()-0.5)*70;
        p.life = 0.5+rnd()*0.5; p.rot = rnd()*Math.PI*2;
        drawPart(p);
      }
    });
  });
}

async function loadImage(file){
  let bmp;
  try{ bmp = await createImageBitmap(file, {imageOrientation:'from-image'}); }
  catch(e){
    bmp = await new Promise(r=>{ const img=new Image(); img.onload=()=>r(img); img.src=URL.createObjectURL(file); });
  }
  const MAX = 1400;
  const sc = Math.min(1, MAX/Math.max(bmp.width, bmp.height));
  const c = document.createElement('canvas');
  c.width = Math.round(bmp.width*sc); c.height = Math.round(bmp.height*sc);
  c.getContext('2d').drawImage(bmp,0,0,c.width,c.height);
  return c;
}

/* ================= 爪の描画 ================= */
const FINGERS = [[4,3],[8,7],[12,11],[16,15],[20,19]];
function mirrored(){ return mode!=='photo' && facing==='user'; }
function drawPhoto(){
  if(!baseImage) return;
  ctx.drawImage(baseImage,0,0);
  drawNails();
  staticSparkles();
}
function lmXY(p){
  let x = p.x*canvas.width, y = p.y*canvas.height;
  if(mirrored()) x = canvas.width - x;
  return [x,y];
}
function drawNails(){
  const alpha = $('opacity').value/100;
  const gloss = $('gloss').value/100;
  const scale = $('nailSize').value/100;
  smoothed.forEach((lm, hi)=>{
    FINGERS.forEach(([tip,dip], fi)=>{
      const [tx,ty]=lmXY(lm[tip]), [dx,dy]=lmXY(lm[dip]);
      const len = Math.hypot(tx-dx,ty-dy);
      if(len < 4) return;
      const ang = Math.atan2(ty-dy,tx-dx);
      const w = len*0.54*scale, h = len*0.94*scale;
      ctx.save();
      ctx.translate(tx+Math.cos(ang)*len*0.10, ty+Math.sin(ang)*len*0.10);
      ctx.rotate(ang+Math.PI/2);
      nailPath(w,h);
      ctx.clip();
      ctx.globalAlpha = alpha;
      paintLook(ctx,w,h,currentColor,hi*5+fi);
      ctx.globalAlpha = alpha*0.3;
      const rim = ctx.createRadialGradient(0,0,Math.min(w,h)*0.35, 0,0,Math.max(w,h)*0.75);
      rim.addColorStop(0,'rgba(0,0,0,0)');
      rim.addColorStop(1,'rgba(0,0,0,.55)');
      ctx.fillStyle=rim; ctx.fillRect(-w,-h,w*2,h*2);
      if(gloss>0.05){
        ctx.globalAlpha = alpha*gloss*0.5;
        ctx.fillStyle='#fff';
        ctx.beginPath();
        ctx.ellipse(-w*0.18,-h*0.20,w*0.14,h*0.24,-0.3,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });
  });
}
function nailPath(w,h){
  // リアル寄りの爪型：縦長・先端はゆるいアーモンド・根元はゆるい半月
  ctx.beginPath();
  ctx.moveTo(-w/2, h*0.26);
  ctx.bezierCurveTo(-w/2, -h*0.26, -w*0.32, -h*0.50, 0, -h*0.50);
  ctx.bezierCurveTo(w*0.32, -h*0.50, w/2, -h*0.26, w/2, h*0.26);
  ctx.bezierCurveTo(w/2, h*0.46, w*0.28, h*0.56, 0, h*0.56);
  ctx.bezierCurveTo(-w*0.28, h*0.56, -w/2, h*0.46, -w/2, h*0.26);
  ctx.closePath();
}

/* ================= メンズデザイン12種 ================= */
function seeded(seed){ let s=seed*9301+49297; return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }
function base(c,w,h,c1,c2){
  const g = c.createLinearGradient(0,-h/2,0,h/2);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  c.fillStyle=g; c.fillRect(-w/2,-h/2,w,h*1.2);
}

/* ================= マイデザイン ================= */
const customLooks = [];
function paintLook(c,w,h,col,seed){ paintByKey(c,currentLook,w,h,col,seed); }
function paintByKey(c,key,w,h,col,seed){
  if(key.startsWith('custom:')){
    const cl = customLooks[+key.slice(7)];
    if(cl) drawCover(c, cl.img, w, h);
    return;
  }
  const lk = LOOKS[key];
  lk.paint(c,w,h,col,seed);
  if(lk.tint){
    // 素材系デザインにも選択カラーの色味を反映
    const keep = c.globalAlpha;
    c.globalAlpha = keep*0.6;
    c.globalCompositeOperation = 'color';
    c.fillStyle = col; c.fillRect(-w/2,-h/2,w,h*1.2);
    c.globalCompositeOperation = 'source-over';
    c.globalAlpha = keep;
  }
}
function drawCover(c,img,w,h){
  const H = h*1.2;
  const sc = Math.max(w/img.width, H/img.height);
  c.drawImage(img, -img.width*sc/2, -h/2 + (H-img.height*sc)/2, img.width*sc, img.height*sc);
}
function addCustomLook(img, name){
  customLooks.push({name: name || 'CUSTOM '+(customLooks.length+1), img});
  currentLook = 'custom:' + (customLooks.length-1);
  buildLooks(); redrawStill();
}
$('designInput').addEventListener('change', async e=>{

  const img=await loadImage(file);

/* ================= エディタ ================= */
const ed = { canvas:null, ctx:null, drawing:false, size:14, erase:false };
function openEditor(){
  $('editor').style.display='flex';
  if(!ed.canvas){
    ed.canvas=$('edCanvas'); ed.ctx=ed.canvas.getContext('2d');
    const c=ed.ctx;
    edClear();
    const pos=ev=>{
      const r=ed.canvas.getBoundingClientRect();
      const p=ev.touches? ev.touches[0]: ev;
      return [(p.clientX-r.left)*ed.canvas.width/r.width, (p.clientY-r.top)*ed.canvas.height/r.height];
    };
    const start=ev=>{ ed.drawing=true; const [x,y]=pos(ev); stroke(x,y,true); ev.preventDefault(); };
    const move=ev=>{ if(!ed.drawing) return; const [x,y]=pos(ev); stroke(x,y,false); ev.preventDefault(); };
    const end=()=>{ ed.drawing=false; };
    function stroke(x,y,first){
      c.globalCompositeOperation = ed.erase ? 'destination-out' : 'source-over';
      c.strokeStyle=currentColor; c.fillStyle=currentColor;
      c.lineWidth=ed.size; c.lineCap='round'; c.lineJoin='round';
      if(first){ c.beginPath(); c.arc(x,y,ed.size/2,0,Math.PI*2); c.fill(); c.beginPath(); c.moveTo(x,y); }
      else { c.lineTo(x,y); c.stroke(); }
    }
    ed.canvas.addEventListener('pointerdown',start);
    ed.canvas.addEventListener('pointermove',move);
    window.addEventListener('pointerup',end);
    $('edSize').addEventListener('input',e=>{ ed.size=+e.target.value; });
    $('edPen').onclick=()=>{ ed.erase=false; $('edPen').classList.add('on'); $('edErase').classList.remove('on'); };
    $('edErase').onclick=()=>{ ed.erase=true; $('edErase').classList.add('on'); $('edPen').classList.remove('on'); };
    $('edClear').onclick=edClear;
    $('edCancel').onclick=()=>{ $('editor').style.display='none'; };
    $('edDone').onclick=()=>{
      const out=document.createElement('canvas');
      out.width=ed.canvas.width; out.height=ed.canvas.height;
      const oc=out.getContext('2d');
      const g=oc.createLinearGradient(0,0,0,out.height);
      g.addColorStop(0,'#2a2d35'); g.addColorStop(1,'#1c1f26');
      oc.fillStyle=g; oc.fillRect(0,0,out.width,out.height);
      oc.drawImage(ed.canvas,0,0);
      addCustomLook(out);
      $('editor').style.display='none';
    };
  }
  const sw=$('edSwatches'); sw.innerHTML='';
  currentPalette.forEach(col=>{
    const s=document.createElement('div');
    s.className='edsw'; s.style.background=col;
    s.onclick=()=>{ currentColor=col; ed.erase=false; $('edPen').classList.add('on'); $('edErase').classList.remove('on'); };
    sw.appendChild(s);
  });
}
function edClear(){ ed.ctx.clearRect(0,0,ed.canvas.width,ed.canvas.height); }

/* ================= カラー（メンズトーン） ================= */
const defaultPalette=[
  '#1a1a1c','#3a3d42','#1e2a44','#4f5942','#5c2430','#4a382e',
  '#c8ccd2','#b98f3e','#2e6fff','#39d98a','#3c2a55','#f4f4f4',

let currentPalette = [];
function renderChips(pal){
  currentPalette = pal;
  const box=$('chips'); box.innerHTML='';
  pal.forEach((col,i)=>{
    const el=document.createElement('div');

  const img=await loadImage(file);

function extractPalette(img,n){
  const c=document.createElement('canvas'); const s=80; c.width=s;c.height=s;
  c.getContext('2d').drawImage(img,0,0,s,s);
  const d=c.getContext('2d').getImageData(0,0,s,s).data;
  const buckets={};
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
    if(mx-mn<18&&(mx>230||mx<40)) continue;
    const k=`${r>>5}_${g>>5}_${b>>5}`;
    if(!buckets[k])buckets[k]={r:0,g:0,b:0,c:0};
    buckets[k].r+=r;buckets[k].g+=g;buckets[k].b+=b;buckets[k].c++;
  }
  return Object.values(buckets).sort((a,b)=>b.c-a.c).slice(0,n)
    .map(x=>rgb2hex(x.r/x.c,x.g/x.c,x.b/x.c));
}

/* ================= ユーティリティ ================= */
function rgb2hex(r,g,b){return '#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('')}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  return rgb2hex((n>>16)+amt,(n>>8&255)+amt,(n&255)+amt);
}
function hexA(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${n>>16},${n>>8&255},${n&255},${a})`;
}
function redrawStill(){ if(mode==='photo') drawPhoto(); }
